<div class="content">

    <h2>Statistic</h2>
    <div id="cache_ts_stat" style="margin-bottom:10px;color:#666;font-size:13px;">Cache: -</div>
    <div id="stat_status_text" style="margin-bottom:10px;color:#0a4a7a;font-size:13px;">Status: -</div>
    <div id="stat_source_text" style="margin-bottom:10px;color:#3b3b3b;font-size:13px;">Quelle: -</div>

    <div class="conn-grid-3">

        <div class="conn-box">
            <div class="conn-header">STAT Parser</div>
            <div class="conn-body">
                <label>
                    <input id="enable_stat" type="checkbox">
                </label>
            </div>
        </div>

        <div class="conn-box">
            <div class="conn-header">MQTT Subtopic</div>
            <div class="conn-body">
                <label>Topic STAT<br>
                    <input id="topic_stat" type="text">
                </label>
            </div>
        </div>

        <div class="conn-box">
            <div class="conn-header">Abfrageintervall</div>
            <div class="conn-body">
                <label>STAT (Sekunden)<br>
                    <input id="interval_stat" type="number">
                </label>
            </div>
        </div>

    </div>

    <div id="stat_groups"></div>
	
	<table id="stat_table"></table>
	<br>
	<button onclick="refreshStat()">Daten abrufen</button>
	&nbsp;
	<button onclick="saveStatSettings()">Speichern</button>


</div>

<script src="/static_statistic.js"></script>

<div class="content">

<h2>Celldata</h2>
<div id="cache_ts_bat" style="margin-bottom:10px;color:#666;font-size:13px;">Cache: -</div>
<div id="bat_status_text" style="margin-bottom:10px;color:#0a4a7a;font-size:13px;">Status: -</div>
<div id="bat_source_text" style="margin-bottom:10px;color:#3b3b3b;font-size:13px;">Quelle: -</div>

<div class="conn-grid-3">

    <div class="conn-box">
        <div class="conn-header">BAT Parser</div>
        <div class="conn-body">
            <label>
                <input id="enable_bat" type="checkbox">
                Aktivieren
            </label>
        </div>
    </div>

    <div class="conn-box">
        <div class="conn-header">MQTT Subtopics</div>
        <div class="conn-body">
            <label>Topic BAT<br>
            <input id="topic_bat" type="text">
            </label>
            <br><br>
            <label>Cell Prefix<br>
            <input id="cell_prefix" type="text">
            </label>
        </div>
    </div>

    <div class="conn-box">
        <div class="conn-header">Abfrageintervall</div>
        <div class="conn-body">
            <label>BAT (Sekunden)<br>
            <input id="interval_bat" type="number">
            </label>
        </div>
    </div>

</div>

<!-- 🔥 HIER KOMMT DIE TABELLE -->
<div class="conn-box">
    <div class="conn-header">Zellwerte</div>
    <div class="conn-body">

        <table class="conn-table">
            <thead>
                <tr>
                    <th>Feldname</th>
                    <th>Anzeigename</th>
                    <th>Rohdaten</th>
                    <th>Faktor</th>
                    <th>Einheit</th>
                    <th>MQTT</th>
                    <th>Send</th>
                </tr>
            </thead>
            <tbody id="bat_table"></tbody>
        </table>

        <button onclick="refreshBat()">Daten abrufen</button>
        &nbsp;
        <button onclick="batSave()">Speichern</button>
    </div>
</div>

</div>

<script src="/static_celldata.js"></script>
